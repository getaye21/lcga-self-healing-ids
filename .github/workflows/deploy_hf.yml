name: Deploy to HuggingFace Spaces

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install huggingface_hub
        run: pip install huggingface_hub
      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          api = HfApi()
          api.upload_folder(
              folder_path='.',
              repo_id='Getaye/lcga-self-healing-ids',
              repo_type='space',
              token='$HF_TOKEN',
              ignore_patterns=['.git*','__pycache__','*.pyc','tests/__pycache__','data/*','models/*','results/*'],
              commit_message='Deploy from GitHub Actions',
          )
          print('✓ Deployed to HuggingFace Space')
          "
