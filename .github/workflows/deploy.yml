name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Install huggingface_hub
        run: pip install "huggingface-hub[cli]>=0.20"

      - name: Upload to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          huggingface-cli whoami
          huggingface-cli upload Getaye/lcga-self-healing-ids . . --repo-type=space --commit-message="Sync from GitHub Actions"
