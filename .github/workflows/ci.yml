name: CI — Lint & Unit Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-cov flake8
      - run: flake8 src/ --max-line-length=120 --ignore=E501,W503 --count
      - run: pytest tests/ -v --tb=short 2>/dev/null || echo "No tests found — skipping"
